<!doctype html>
<html lang="en">
  <head>
    <title>Low-Level I/O Lab: Busy Data</title>
  </head>

  <body>
    <h1>Reading Data in a Busy-Wait Loop</h1>

    <p>
      Each press of the following button should toggle the
      output on your console.
    </p>

    <p>
      <button id="toggle">Toggle Me</button>
    </p>

    <script>
      function setup() {
	document.querySelector('#toggle').addEventListener('click', async () => {
	  const res = await fetch('/api/post-line', {
	    method: 'POST',
	    headers: {
	      'Content-Type': 'application/json',
	    },
	    body: JSON.stringify({"line": ""}),
	  });
	});
      }
      
      document.addEventListener('DOMContentLoaded', setup);
    </script>
    
  </body>
</html>
